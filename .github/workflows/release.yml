name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary: target/release/sndoc.exe
            artifact: sndoc-windows-amd64.exe
          - os: ubuntu-latest
            binary: target/release/sndoc
            artifact: sndoc-linux-amd64
          - os: macos-latest
            binary: target/release/sndoc
            artifact: sndoc-macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # git2's `vendored-libgit2`/`vendored-openssl` features compile libgit2
      # (and OpenSSL on Linux) from source at build time, which needs cmake
      # and a C compiler. GitHub-hosted runners normally ship both already;
      # this is just a defensive check in case a runner image ever doesn't.
      - name: Ensure cmake is available (git2's vendored libgit2 needs it)
        shell: bash
        run: |
          if ! command -v cmake >/dev/null 2>&1; then
            case "${{ runner.os }}" in
              Linux) sudo apt-get update && sudo apt-get install -y cmake ;;
              macOS) brew install cmake ;;
              Windows) choco install cmake --no-progress ;;
            esac
          fi

      # A single static binary: the bundled SQLite (with FTS5), the sqlite-vec
      # `vec0` extension, and the git client (libgit2, vendored via git2) are
      # all compiled in — no loadable extension and no `git` binary at
      # runtime. The ~30 MB embedding model is still downloaded from Hugging
      # Face on first run, not bundled.
      - name: Build release binary
        run: cargo build --release --locked

      # Fail the build if the native pieces are broken instead of shipping a
      # binary whose search silently doesn't work. `doctor` verifies sqlite-vec
      # + FTS5 load.
      - name: Smoke test
        shell: bash
        run: |
          "${{ matrix.binary }}" --help
          "${{ matrix.binary }}" doctor

      - name: Build installer (Windows only)
        if: runner.os == 'Windows'
        run: iscc installer\installer.iss

      - name: Rename binary for upload
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.os == 'windows-latest' && 'dist/sndoc-setup.exe' || '' }}
